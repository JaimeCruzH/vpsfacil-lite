################################################################################
# VPSfacil-lite — Configuración por defecto
# Sin Docker — apps instaladas como servicios systemd nativos
################################################################################

# Sistema base
DEBIAN_VERSION="12"
TIMEZONE="America/Santiago"
SSH_PORT="22"

# Firewall
ENABLE_FIREWALL="true"

# Aplicaciones incluidas (core, sin Docker)
ENABLE_FILEBROWSER="true"
ENABLE_KOPIA="true"
ENABLE_BESZEL="true"

# Puertos internos (nginx proxea a HTTPS 443)
PORT_FILEBROWSER="8080"
PORT_KOPIA="51515"
PORT_BESZEL="8090"

# Backup
BACKUP_RETENTION_DAYS="30"
BACKUP_SCHEDULE="0 2 * * *"

# Logging
LOG_DIR="/var/log/vpsfacil"

# Versiones de binarios (latest = descargar más reciente)
FILEBROWSER_VERSION="latest"
KOPIA_VERSION="latest"
BESZEL_VERSION="latest"

################################################################################
